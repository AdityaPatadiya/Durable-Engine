apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: staging-durable-engine
  labels:
    app.kubernetes.io/name: durable-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: staging-durable-engine
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

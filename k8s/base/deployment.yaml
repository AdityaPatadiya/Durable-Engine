apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-engine
  labels:
    app.kubernetes.io/name: durable-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: durable-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: durable-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: durable-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: durable-engine
          image: durable-engine:latest
          args:
            - "--config"
            - "/app/config/engine.yaml"
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: durable-engine
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "4"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: dlq
              mountPath: /app/dlq
            - name: output
              mountPath: /app/output
      volumes:
        - name: config
          configMap:
            name: durable-engine-config
        - name: dlq
          persistentVolumeClaim:
            claimName: durable-engine-dlq
        - name: output
          persistentVolumeClaim:
            claimName: durable-engine-output

apiVersion: v1
kind: Service
metadata:
  name: durable-engine
  labels:
    app.kubernetes.io/name: durable-engine
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: health
      protocol: TCP
      name: health
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: durable-engine

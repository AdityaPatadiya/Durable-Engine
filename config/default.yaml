engine:
  name: "durable-engine"
  batch_size: 500
  max_queue_size: 10000
  worker_count: 4
  shutdown_timeout_seconds: 30

ingestion:
  file_path: "samples/sample.csv"
  file_format: "auto"  # auto | csv | jsonl | fixed_width
  encoding: "utf-8"
  csv:
    delimiter: ","
    quotechar: '"'
    has_header: true
  fixed_width:
    column_widths: [10, 20, 15, 30, 10]
    column_names: ["id", "name", "age", "email", "status"]
  checkpoint:
    enabled: true
    file: "output/checkpoint.json"
    interval_seconds: 10

sinks:
  rest_api:
    enabled: true
    type: "rest"
    endpoint: "http://localhost:8081/api/records"
    transformer: "json"
    rate_limit:
      requests_per_second: 50
      burst_size: 100
    retry:
      max_retries: 3
      base_delay_ms: 100
      max_delay_ms: 5000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_seconds: 30
      half_open_max_calls: 3
    concurrency: 10
    timeout_seconds: 30
    batch_size: 50
    simulation:
      latency_ms: 50
      latency_jitter_ms: 20
      error_rate: 0.02
      transient_error_rate: 0.8

  grpc:
    enabled: true
    type: "grpc"
    endpoint: "localhost:9091"
    transformer: "protobuf"
    rate_limit:
      requests_per_second: 200
      burst_size: 500
    retry:
      max_retries: 3
      base_delay_ms: 50
      max_delay_ms: 3000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 10
      recovery_timeout_seconds: 20
      half_open_max_calls: 5
    concurrency: 20
    timeout_seconds: 15
    batch_size: 100
    streaming_mode: "unary"  # unary | bidirectional
    simulation:
      latency_ms: 20
      latency_jitter_ms: 10
      error_rate: 0.01
      transient_error_rate: 0.9

  message_queue:
    enabled: true
    type: "mq"
    endpoint: "localhost:9092"
    topic: "records-topic"
    transformer: "xml"
    rate_limit:
      requests_per_second: 500
      burst_size: 1000
    retry:
      max_retries: 3
      base_delay_ms: 200
      max_delay_ms: 10000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 8
      recovery_timeout_seconds: 25
      half_open_max_calls: 3
    concurrency: 15
    timeout_seconds: 20
    batch_size: 200
    partitions: 6
    simulation:
      latency_ms: 10
      latency_jitter_ms: 5
      error_rate: 0.005
      transient_error_rate: 0.95

  wide_column_db:
    enabled: true
    type: "widecolumn"
    endpoint: "localhost:9042"
    keyspace: "fan_out"
    table: "records"
    transformer: "avro"
    rate_limit:
      requests_per_second: 1000
      burst_size: 2000
    retry:
      max_retries: 3
      base_delay_ms: 50
      max_delay_ms: 2000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 15
      recovery_timeout_seconds: 15
      half_open_max_calls: 5
    concurrency: 30
    timeout_seconds: 10
    batch_size: 500
    consistency_level: "LOCAL_QUORUM"
    simulation:
      latency_ms: 5
      latency_jitter_ms: 3
      error_rate: 0.001
      transient_error_rate: 0.95

dlq:
  output_dir: "dlq"
  max_file_size_mb: 100
  include_error_metadata: true

observability:
  reporter:
    interval_seconds: 5
    format: "rich"  # rich | plain | json
  logging:
    level: "INFO"
    format: "json"  # json | console
    file: "output/engine.log"
  health:
    enabled: true
    port: 8080
    path: "/health"
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"

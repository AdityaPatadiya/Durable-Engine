# Docker-compose config — connects to local infra services from docker-compose.yml
# Usage: docker-compose up -d && python -m durable_engine --config config/docker.yaml

engine:
  name: "durable-engine-docker"
  batch_size: 500
  max_queue_size: 10000
  worker_count: 4
  shutdown_timeout_seconds: 30

ingestion:
  file_path: "samples/sample.csv"
  file_format: "auto"
  encoding: "utf-8"
  csv:
    delimiter: ","
    quotechar: '"'
    has_header: true
  checkpoint:
    enabled: true
    file: "output/checkpoint.json"
    interval_seconds: 10

sinks:
  rest_api:
    enabled: true
    mode: "live"
    type: "rest"
    endpoint: "http://localhost:8081"
    http_path: "/post"
    http_method: "POST"
    transformer: "json"
    headers:
      Content-Type: "application/json"
    auth:
      type: "none"
    rate_limit:
      requests_per_second: 50
      burst_size: 100
    retry:
      max_retries: 3
      base_delay_ms: 100
      max_delay_ms: 5000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 5
      recovery_timeout_seconds: 30
      half_open_max_calls: 3
    concurrency: 10
    timeout_seconds: 30
    batch_size: 50

  grpc:
    enabled: false
    mode: "mock"
    type: "grpc"
    endpoint: "localhost:9091"
    transformer: "protobuf"
    streaming_mode: "unary"
    simulation:
      latency_ms: 20
      latency_jitter_ms: 10
      error_rate: 0.01
      transient_error_rate: 0.9
    rate_limit:
      requests_per_second: 200
      burst_size: 500
    concurrency: 20
    timeout_seconds: 15
    batch_size: 100

  kafka:
    enabled: true
    mode: "live"
    type: "mq"
    mq_type: "kafka"
    endpoint: "localhost:29092"
    topic: "records-topic"
    transformer: "xml"
    partitions: 6
    auth:
      type: "none"
    tls:
      enabled: false
    rate_limit:
      requests_per_second: 500
      burst_size: 1000
    retry:
      max_retries: 3
      base_delay_ms: 200
      max_delay_ms: 10000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 8
      recovery_timeout_seconds: 25
      half_open_max_calls: 3
    concurrency: 15
    timeout_seconds: 20
    batch_size: 200

  cassandra:
    enabled: true
    mode: "live"
    type: "widecolumn"
    db_type: "cassandra"
    endpoint: "localhost:9042"
    keyspace: "fan_out"
    table: "records"
    consistency_level: "ONE"
    transformer: "avro"
    auth:
      type: "none"
    tls:
      enabled: false
    rate_limit:
      requests_per_second: 1000
      burst_size: 2000
    retry:
      max_retries: 3
      base_delay_ms: 50
      max_delay_ms: 2000
      backoff_multiplier: 2.0
    circuit_breaker:
      failure_threshold: 15
      recovery_timeout_seconds: 15
      half_open_max_calls: 5
    concurrency: 30
    timeout_seconds: 10
    batch_size: 500

dlq:
  output_dir: "dlq"
  max_file_size_mb: 100
  include_error_metadata: true

observability:
  reporter:
    interval_seconds: 5
    format: "rich"
  logging:
    level: "INFO"
    format: "console"
    file: "output/engine.log"
  health:
    enabled: true
    port: 8080
    path: "/health"
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"

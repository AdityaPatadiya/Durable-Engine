# WebSocket Source — connects to a WebSocket endpoint and consumes
# real-time messages as records.
#
# No extra dependencies needed (uses aiohttp, already installed).
#
# Usage: python -m durable_engine --config config/source-websocket.yaml
#
# Example WebSocket APIs you can connect to:
#   - Crypto prices: wss://stream.binance.com:9443/ws/btcusdt@trade
#   - Stock market: wss://ws.finnhub.io?token=YOUR_TOKEN
#   - IoT sensors: wss://your-iot-gateway.com/stream
#
# Runs FOREVER, auto-reconnects on disconnect. Press Ctrl+C to stop.

engine:
  name: "durable-engine-websocket"
  batch_size: 100
  max_queue_size: 20000
  worker_count: 4
  shutdown_timeout_seconds: 30

ingestion:
  source_type: "websocket"
  websocket:
    url: "wss://stream.binance.com:9443/ws/btcusdt@trade"
    auth_token: ""
    headers: {}
    reconnect_delay: 5.0
    ping_interval: 30.0
    # subscribe_message: '{"method": "SUBSCRIBE", "params": ["btcusdt@trade"]}'

sinks:
  rest_api:
    enabled: true
    mode: "mock"
    type: "rest"
    endpoint: "http://localhost:8081/api/records"
    transformer: "json"
    rate_limit:
      requests_per_second: 200
      burst_size: 500
    concurrency: 20
    timeout_seconds: 30
    batch_size: 100
    simulation:
      latency_ms: 10
      latency_jitter_ms: 5
      error_rate: 0.005
      transient_error_rate: 0.9

  message_queue:
    enabled: true
    mode: "mock"
    type: "mq"
    mq_type: "kafka"
    endpoint: "localhost:9092"
    topic: "live-stream"
    transformer: "json"
    partitions: 6
    rate_limit:
      requests_per_second: 1000
      burst_size: 2000
    concurrency: 15
    timeout_seconds: 20
    batch_size: 500
    simulation:
      latency_ms: 5
      latency_jitter_ms: 3
      error_rate: 0.001
      transient_error_rate: 0.95

dlq:
  output_dir: "dlq"
  max_file_size_mb: 100
  include_error_metadata: true

observability:
  reporter:
    interval_seconds: 5
    format: "rich"
  logging:
    level: "INFO"
    format: "console"
    file: "output/engine.log"

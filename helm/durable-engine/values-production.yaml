# Production environment overrides
replicaCount: 3

image:
  repository: 099554283709.dkr.ecr.ap-south-1.amazonaws.com/durable-engine
  pullPolicy: IfNotPresent
  # tag: set via CI/CD (e.g., --set image.tag=v1.2.3)

# No imagePullSecrets needed: the EKS node role has AmazonEC2ContainerRegistryReadOnly.
# If you later switch back to ghcr.io, create a docker-registry secret and reference it here:
#   kubectl create secret docker-registry ghcr-credentials \
#     --docker-server=ghcr.io \
#     --docker-username=<github-user> \
#     --docker-password=<PAT-with-read:packages> \
#     -n durable-engine-production
# imagePullSecrets:
#   - name: ghcr-credentials

resources:
  requests:
    cpu: "1"
    memory: 512Mi
  limits:
    cpu: "4"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: "50%"

# Use an externally managed secret (e.g., from Vault, Sealed Secrets, or ExternalSecrets)
secrets:
  create: false
  existingSecret: "durable-engine-credentials"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - durable-engine
          topologyKey: kubernetes.io/hostname

persistence:
  dlq:
    enabled: true
    size: 10Gi
  output:
    enabled: true
    size: 5Gi

config:
  custom:
    engine:
      name: "durable-engine-production"
      batch_size: 1000
      max_queue_size: 50000
      worker_count: 8
      shutdown_timeout_seconds: 60
    ingestion:
      file_path: "${INPUT_FILE_PATH}"
      file_format: "auto"
      checkpoint:
        enabled: true
        file: "output/checkpoint.json"
        interval_seconds: 5
    sinks:
      rest_api:
        enabled: true
        mode: "live"
        type: "rest"
        endpoint: "https://api.example.com"
        http_path: "/v1/records"
        http_method: "POST"
        transformer: "json"
        headers:
          Content-Type: "application/json"
          X-Source: "durable-engine"
        auth:
          type: "bearer"
          token: "${REST_API_TOKEN}"
        tls:
          enabled: true
          verify: true
        rate_limit:
          requests_per_second: 100
          burst_size: 200
        retry:
          max_retries: 3
          base_delay_ms: 200
          max_delay_ms: 10000
          backoff_multiplier: 2.0
        circuit_breaker:
          failure_threshold: 10
          recovery_timeout_seconds: 30
          half_open_max_calls: 3
        concurrency: 20
        timeout_seconds: 30
        batch_size: 50
      kafka:
        enabled: true
        mode: "live"
        type: "mq"
        mq_type: "kafka"
        endpoint: "kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092"
        topic: "records-ingested"
        transformer: "json"
        partitions: 12
        auth:
          type: "basic"
          username: "${KAFKA_USERNAME}"
          password: "${KAFKA_PASSWORD}"
        tls:
          enabled: true
        rate_limit:
          requests_per_second: 5000
          burst_size: 10000
        retry:
          max_retries: 3
          base_delay_ms: 100
          max_delay_ms: 5000
          backoff_multiplier: 2.0
        circuit_breaker:
          failure_threshold: 20
          recovery_timeout_seconds: 15
          half_open_max_calls: 5
        concurrency: 20
        timeout_seconds: 30
        batch_size: 500
      cassandra:
        enabled: true
        mode: "live"
        type: "widecolumn"
        db_type: "cassandra"
        endpoint: "cassandra-node-1:9042,cassandra-node-2:9042"
        keyspace: "fan_out"
        table: "records"
        consistency_level: "LOCAL_QUORUM"
        transformer: "avro"
        auth:
          type: "basic"
          username: "${CASSANDRA_USER}"
          password: "${CASSANDRA_PASS}"
        rate_limit:
          requests_per_second: 3000
          burst_size: 5000
        retry:
          max_retries: 3
          base_delay_ms: 50
          max_delay_ms: 2000
          backoff_multiplier: 2.0
        circuit_breaker:
          failure_threshold: 20
          recovery_timeout_seconds: 10
          half_open_max_calls: 5
        concurrency: 50
        timeout_seconds: 10
        batch_size: 500
    dlq:
      output_dir: "dlq"
      max_file_size_mb: 100
      include_error_metadata: true
    observability:
      reporter:
        interval_seconds: 5
        format: "json"
      logging:
        level: "WARNING"
        format: "json"
        file: "output/engine.log"
      health:
        enabled: true
        port: 8080
        path: "/health"
      metrics:
        enabled: true
        port: 9090
        path: "/metrics"

serviceMonitor:
  # Requires Prometheus Operator CRDs in the cluster.
  # Re-enable after installing kube-prometheus-stack (or just the operator CRDs).
  enabled: false
  interval: 15s
  scrapeTimeout: 10s

# Staging environment overrides
replicaCount: 2

image:
  repository: ghcr.io/adityap-cruv/durable-engine
  tag: staging

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 1

secrets:
  create: true
  data:
    REST_API_TOKEN: "changeme"
    KAFKA_USERNAME: "staging-user"
    KAFKA_PASSWORD: "changeme"

config:
  custom:
    engine:
      name: "durable-engine-staging"
      batch_size: 500
      max_queue_size: 10000
      worker_count: 4
      shutdown_timeout_seconds: 30
    ingestion:
      file_path: "samples/sample.csv"
      file_format: "auto"
      checkpoint:
        enabled: true
        file: "output/checkpoint.json"
        interval_seconds: 10
    sinks:
      rest_api:
        enabled: true
        mode: "live"
        type: "rest"
        endpoint: "https://api-staging.example.com"
        http_path: "/v1/records"
        http_method: "POST"
        transformer: "json"
        headers:
          Content-Type: "application/json"
        auth:
          type: "bearer"
          token: "${REST_API_TOKEN}"
        rate_limit:
          requests_per_second: 50
          burst_size: 100
        retry:
          max_retries: 3
          base_delay_ms: 200
          max_delay_ms: 10000
          backoff_multiplier: 2.0
        circuit_breaker:
          failure_threshold: 5
          recovery_timeout_seconds: 30
          half_open_max_calls: 3
        concurrency: 10
        timeout_seconds: 30
        batch_size: 50
      kafka:
        enabled: true
        mode: "live"
        type: "mq"
        mq_type: "kafka"
        endpoint: "kafka-staging:9092"
        topic: "records-staging"
        transformer: "json"
        partitions: 6
        auth:
          type: "basic"
          username: "${KAFKA_USERNAME}"
          password: "${KAFKA_PASSWORD}"
        rate_limit:
          requests_per_second: 1000
          burst_size: 2000
        concurrency: 10
        timeout_seconds: 20
        batch_size: 200
    dlq:
      output_dir: "dlq"
      max_file_size_mb: 100
      include_error_metadata: true
    observability:
      reporter:
        interval_seconds: 10
        format: "json"
      logging:
        level: "INFO"
        format: "json"
        file: "output/engine.log"
      health:
        enabled: true
        port: 8080
        path: "/health"
      metrics:
        enabled: true
        port: 9090
        path: "/metrics"

serviceMonitor:
  enabled: true
  interval: 30s
